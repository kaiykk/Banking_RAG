# 银行业RAG问答系统配置文件

# 数据配置
data:
  dataset_id: "eggbiscuit/DISC-FIN-SFT"  # Hugging Face 数据集ID
  filter_banking: true  # 是否过滤银行相关数据
  perplexity_threshold: 10000.0  # 困惑度阈值
  prompt_template: "问题：{question}\n答案："  # 提示模板
  input_paths: []  # 原始数据路径，支持json/jsonl/csv/tsv文件或目录
  field_mapping: {}  # 字段映射，如 question/answer/rejected/source/category
  lora_output_path: "./data/processed/lora_data.json"  # LoRA训练数据输出路径
  dpo_output_path: "./data/processed/dpo_data.json"  # DPO训练数据输出路径
  knowledge_output_path: "./data/processed/knowledge.jsonl"  # RAG知识源输出路径

# 模型路径配置
models:
  base_model_path: "./models/Baichuan2-7B-Base"  # Baichuan2基础模型路径
  embedding_model_path: "./models/bge-m3"  # BGE-M3嵌入模型路径
  rerank_model_path: "./models/bge-m3-reranker"  # BGE-M3重排序模型路径
  lora_adapter_path: "./models/lora_adapter"  # LoRA适配器保存路径
  dpo_model_path: "./models/dpo_model"  # DPO优化模型保存路径
  finetuned_embedding_path: "./models/finetuned_embedding"  # 微调嵌入模型路径
  finetuned_rerank_path: "./models/finetuned_rerank"  # 微调重排序模型路径

# LoRA训练超参数
lora:
  rank: 8  # LoRA秩
  alpha: 16  # LoRA alpha
  dropout: 0.05  # Dropout率
  learning_rate: 0.0001  # 学习率
  batch_size: 4  # 批次大小
  epochs: 3  # 训练轮数
  gradient_accumulation_steps: 4  # 梯度累积步数
  warmup_steps: 100  # 预热步数
  logging_steps: 10  # 日志记录间隔

# DPO训练超参数
dpo:
  beta: 0.1  # DPO beta参数
  learning_rate: 0.00005  # 学习率
  batch_size: 2  # 批次大小
  epochs: 2  # 训练轮数
  gradient_accumulation_steps: 8  # 梯度累积步数
  warmup_steps: 50  # 预热步数
  logging_steps: 10  # 日志记录间隔

# RAG配置
rag:
  chunk_max_tokens: 512  # 每个块的最大令牌数
  chunk_overlap: 50  # 块之间的重叠令牌数
  chunk_max_chars: 1200  # 最小RAG实现使用的字符级切块长度
  chunk_overlap_chars: 120  # 最小RAG实现使用的字符级重叠长度
  retrieval_top_k: 10  # 检索的top-k块数
  retrieval_strategy: "mmr"  # 检索策略：similarity 或 mmr
  retrieval_fetch_k: 40  # MMR候选池大小
  mmr_lambda: 0.7  # MMR相关性权重，越高越偏向相似度
  enable_rerank: false  # 是否启用重排序模型
  rerank_top_n: 5  # 重排序后保留的top-n块数
  rerank_batch_size: 16  # 重排序批处理大小
  context_template: "参考信息：\n{context}\n\n问题：{question}\n答案："  # 上下文模板
  vector_db_path: "./data/vector_db"  # 向量数据库保存路径
  index_file: "index.faiss"  # FAISS索引文件名
  chunks_file: "chunks.json"  # 文本块元数据文件名
  manifest_file: "manifest.json"  # 索引构建摘要文件名
  embedding_batch_size: 32  # embedding批处理大小
  source_paths: []  # 知识源路径，支持txt/md/json/jsonl文件或目录
  
  # 自适应检索参数
  adaptive:
    simple_query_top_k: 5  # 简单查询的top-k
    medium_query_top_k: 10  # 中等查询的top-k
    complex_query_top_k: 15  # 复杂查询的top-k

# 推理生成参数
inference:
  temperature: 0.7  # 生成温度
  max_tokens: 512  # 最大生成令牌数
  top_p: 0.9  # Top-p采样
  repetition_penalty: 1.1  # 重复惩罚
  use_generation: false  # 默认只返回检索上下文，传入--generate后再调用本地模型
  model_path: ""  # 可选：覆盖默认DPO模型路径
  include_prompt: true  # 输出中是否包含拼接后的prompt
  include_sources: true  # 输出中是否包含检索来源文本块
  torch_dtype: ""  # 可选：float16/bfloat16/float32
  device_map: ""  # 可选：auto/cuda/cpu等transformers支持的device_map

# GPT-4 API配置（用于风格优化）
gpt4:
  api_key: ""  # OpenAI API密钥（需要用户填写）
  model: "gpt-4"  # 使用的模型
  max_retries: 3  # 最大重试次数
  retry_delay: 1.0  # 重试延迟（秒）

# 日志配置
logging:
  level: "INFO"  # 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
  console: true  # 是否输出到控制台
  file: true  # 是否输出到文件
  log_file_path: "./logs/system.log"  # 日志文件路径
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"  # 日志格式

# 评估配置
evaluation:
  test_data_path: "./data/test_set.json"  # 测试集路径
  retrieval_test_data_path: "./data/retrieval_eval.jsonl"  # 检索评估数据路径
  retrieval_report_path: "./data/reports/retrieval_eval_report.json"  # 检索评估报告输出路径
  retrieval_top_k: 10  # 检索评估top-k
  baseline_trulen_score: 67.2  # 基线TruLen分数
